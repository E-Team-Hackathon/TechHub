{% extends "base.html" %}

{% block title %}ログイン画面{% endblock %}

{% block content %}
{% load static %}

<div class="container d-flex flex-column align-items-center">
    <h3 class="display-5 text-center" style="font-family: 'Montserrat', sans-serif;">ログイン</h3>

    <form method="POST" action="{% url 'login' %}" class="w-100 mt-4">
        {% csrf_token %}
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="InputUsername" class="form-label">ユーザー名</label>
                    <input type="text" class="form-control" id="InputUsername" name="username" placeholder="Mattermost名" required>
                </div>
                <div class="mb-3">
                    <label for="InputPassword" class="form-label">パスワード</label>
                    <input type="password" class="form-control" id="InputPassword" name="password" required>
                </div>

                <!-- メッセージの表示 -->
                {% if messages %}
                <div class="mt-2">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} text-danger" role="alert">
                        {{ message }}　ユーザー名とパスワードを確認してください。
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4 border border-0 rounded-pill fw-bold" style="background-color: #C4D9FF; color: #333333;">
                        ログイン
                    </button>
                </div>
            </div>
        </div>

    </form>

    <div class="text-center mt-3">
        <a href="{% url 'signup' %}" class="btn btn-link">アカウントを作成する</a>
    </div>
</div>
{% endblock content %}
