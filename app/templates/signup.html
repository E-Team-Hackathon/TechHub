{% block title %}新規登録画面{% endblock %}

{% block content %}
{% include "_formhelpers.html" %}
<main>
  <h2>登録してください</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="container">
      <!-- <label for="InputUsername" class="form-label">ユーザー名</label>
      <input type="text" class="form-control" id="InputUsername" name="username" placeholder="Mattermost名" required>
      <label for="InputPassword" class="form-label">パスワード</label>
      <input type="password" class="form-control" id="InputPassword1" name="password1" required>
      <label for="InputPassword" class="form-label">パスワード確認</label>
      <input type="password" class="form-control" id="InputPassword2" name="password2" required> -->

      <div>
        <button type="submit" class="btn btn-primary">登録する</button>
