<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TechHub ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid" style="background-color: #C5BAFF;">
          <a class="navbar-brand" href="#">
            <img src="app/static/img/logo_transparent.png" alt="TechHubロゴ" width="30" height="24">
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="nav">
              <a class="nav-link active" aria-current="page" href="#">トップページ</a>
              <!-- <a class="nav-link" href="#">トップページ</a> -->
              <a class="nav-link" href="#">マイページ</a>
            </div>
            <div class="nav justify-content-end">
              <a class="nav-link disabled">ユーザー名</a>
            </div>
          </div>
        </div>
      </nav>
    </header>
    
    <p class="fs-1">ログイン</p>
    <form>
        <div class="container">
            <label for="InputEmail" class="form-label">ユーザー名</label>
            <input type="username" class="form-control" id="InputUsername" placeholder="Mattermost名"required >
            <br>
            <label for="InputPassword" class="form-label">パスワード</label>
            <input type="password" class="form-control" id="InputPassword" required>
            <br>
            <button type="login" class="btn btn-primary">マイページへ</button>
        </div>
        
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
　　</body>
</html>

  nav{

  }

    font: bold;
