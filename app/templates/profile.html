{% extends 'base.html' %}

{% block title %}アカウント設定画面{% endblock %}

{% block content %}
{% include "_formhelpers.html" %}
{% load static %}

<div class="container d-flex justify-content-center align-items-center" 
                style="width: 480px; height: 120px; overflow: hidden;">
    <h3 class="display-3" style="font-family: 'Montserrat', sans-serif;">設定</h3>
</div>


<!-- アカウント設定 セクション -->
<div class="p-3 mb-2 bg-body-tertiary rounded-3">
    <div class="container-fluid border rounded-4 p-4 m-4" style="background-color: #FBFBFB; border-radius: 20px;">
    <!-- タイトル -->
    <h3 class="display-7 text-center mb-4" style="font-family: 'Montserrat', sans-serif;">アカウント設定</h3>

        <!-- アカウント情報 -->
        <div class="container text-center">
            <!-- ユーザー情報 -->
            <div class="row justify-content-center align-items-center">
                <div class="col-4 mb-3">
                    <label for="formFile" class="form-label fw-bold">アイコン画像</label>
                </div>
                <!-- ユーザーアイコン-->
                <div class="col-4 mb-3 align-items-center">
                    <img src="{{ request.user.profile_icon.url }}" alt="アイコン" 
                    class="rounded-circle mb-2" 
                    width="100" height="100" 
                    style="object-fit: cover;">
                    <br>
                    <input class="form-control" type="file" id="formFile">
                </div>
                <!-- ユーザー名 -->
                <div class="row justify-content-center">
                    <label class="col-4 mb-3 fw-bold">アカウント名</label>
                    <a class="col-4 mb-3">
                        <input type="username" class="form-control" id="InputUsername" placeholder="{{ user.username }}" >
                    </a>
                </div>
                <div class="row justify-content-center">
                    <label class="col-4 mb-3 fw-bold">パスワード</label>
                    <a class="col-4 mb-4">
                        <input type="username" class="form-control" id="InputUsername" placeholder="{{ user.password }}">
                    </a>
                </div>

                <!-- アクションボタン -->
                <div class="row text-center">
                    <form>
                        <div class="col-12 mb-1">
                            <a href="#" class="btn w-100 px-5 rounded-pill fw-bold" style="background-color: #C4D9FF; color: #333333; max-width: 300px;">
                                保存する
                            </a>
                        </div>
                        <div class="col-12 mb-2">
                            <a href="#" class="btn w-100 px-5 rounded-pill fw-bold" style="background-color:rgb(253, 123, 123); color: #333333; max-width: 300px;">
                                アカウント削除
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 投稿者設定 セクション -->
    <div class="container-fluid border rounded-4 p-4 m-4" style="background-color: #FBFBFB; border-radius: 20px;">
        <!-- タイトル -->
        <h3 class="display-7 text-center mb-4" style="font-family: 'Montserrat', sans-serif;">
            投稿者設定
        </h3>

        <!-- 投稿者設定フォーム -->
        <form>
            <!-- 投稿しているサイトの選択 -->
            <div class="mb-4 row align-items-center justify-content-center">
                <label for="siteRadio" class="col-sm-4 col-form-label text-center fw-bold">
                    投稿しているサイト
                </label>
                <div class="col-sm-4 d-flex flex-column justify-content-center">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="siteRadio" id="qiitaRadio" value="qiita" checked>
                        <label class="form-check-label" for="qiitaRadio">Qiita</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="siteRadio" id="zennRadio" value="zenn">
                        <label class="form-check-label" for="zennRadio">Zenn</label>
                    </div>
                </div>
            </div>


            <!-- アカウントID -->
            <div class="mb-4 row justify-content-center">
                <label for="accountID" class="col-sm-4 col-form-label text-center fw-bold">
                    アカウントID
                </label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" id="accountID" placeholder="アカウントIDを入力">
                </div>
            </div>

            <!-- 保存ボタン -->
            <div class="text-center">
                <button type="submit" class="btn w-100 px-5 rounded-pill fw-bold" style="background-color: #C4D9FF; color: #333333; max-width: 300px;">
                    保存する
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
