server {
        listen 80;
        charset utf-8;

        location /static/ {
            alias /app/staticfiles;
        }

        location /techhub/ {
            proxy_pass http://http://13.230.200.73;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        server_tokens off;
    }





